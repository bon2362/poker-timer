<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* TOP BAR */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px 28px 0;
    }
    .corner-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      width: 32px;
    }
    .level-info { text-align: center; flex: 1; }
    .level-label {
      font-size: 13px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .blinds-current { font-size: 28px; font-weight: 700; }

    /* TIMER */
    .timer-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .timer {
      font-size: clamp(140px, 22vw, 240px);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* PROGRESS BAR */
    .progress-wrap { padding-bottom: 6px; }
    .progress-bar { height: 3px; background: #333; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #7c3aed;
      transition: width 0.9s linear;
    }

    /* BOTTOM */
    .bottom {
      padding: 8px 28px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .next-info { font-size: 13px; color: #888; letter-spacing: 1px; }
    .next-info strong { color: #aaa; }

    /* CONTROLS */
    .controls { display: flex; gap: 10px; align-items: center; }
    .btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      border-radius: 8px;
      width: 44px;
      height: 38px;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { background: #6d28d9; }
    .btn-ghost { background: #2a2a2a; }
    .btn-ghost:hover { background: #383838; }
    .btn-lg { width: 52px; height: 42px; font-size: 18px; }

    /* BREAK SCREEN */
    body.is-break .timer { color: #60a5fa; }
    body.is-break .progress-fill { background: #2563eb; }

    /* PAUSED STATE */
    body.is-paused .timer { opacity: 0.6; }

    /* END SCREEN */
    .end-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .end-screen h1 { font-size: 48px; font-weight: 900; color: #7c3aed; }
    .end-screen p { color: #888; font-size: 18px; }
    body.is-over .end-screen { display: flex; }
    body.is-over .timer-wrap,
    body.is-over .progress-wrap,
    body.is-over .bottom { display: none; }

    /* SETTINGS SCREEN */
    #settings-screen { display: none; flex-direction: column; height: 100vh; }
    body.is-settings #settings-screen { display: flex; }
    body.is-settings > .top,
    body.is-settings > .timer-wrap,
    body.is-settings > .progress-wrap,
    body.is-settings > .bottom,
    body.is-settings > .end-screen { display: none; }

    .settings-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    }
    .settings-top h1 { font-size: 16px; font-weight: 600; color: #ccc; letter-spacing: 1px; }
    .back-btn { background: none; border: none; color: #7c3aed; font-size: 14px; cursor: pointer; }
    .settings-save-btn {
      background: #7c3aed; border: none; color: #fff;
      border-radius: 8px; padding: 7px 18px; font-size: 14px; cursor: pointer; font-weight: 600;
    }
    .settings-save-btn:hover { background: #6d28d9; }

    .settings-content {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .settings-section-title {
      font-size: 11px; color: #555; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .settings-fields-row { display: flex; gap: 12px; }
    .settings-field { flex: 1; background: #242424; border-radius: 8px; padding: 12px 14px; }
    .settings-field label {
      display: block; font-size: 11px; color: #666;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .settings-field-row { display: flex; align-items: center; gap: 8px; }
    .settings-field input {
      background: #333; border: 1px solid #444; border-radius: 6px;
      color: #fff; padding: 6px 10px; font-size: 18px; font-weight: 700;
      width: 72px; text-align: center;
    }
    .settings-field input:focus { outline: none; border-color: #7c3aed; }
    .settings-field input.error { border-color: #ef4444; }
    .settings-field-unit { color: #555; font-size: 13px; }
    .settings-field-error {
      color: #ef4444; font-size: 11px; margin-top: 4px; display: none;
    }

    .blinds-tbl { width: 100%; border-collapse: collapse; }
    .blinds-tbl th {
      color: #555; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; text-align: left; padding: 0 8px 8px; font-weight: normal;
    }
    .blinds-tbl th:first-child { width: 32px; }
    .blinds-tbl th:last-child { width: 40px; }
    .blinds-tbl td { padding: 3px 8px; }
    .blinds-tbl .row-num { color: #444; font-size: 12px; text-align: center; }
    .blinds-tbl input {
      background: #242424; border: 1px solid #333; border-radius: 6px;
      color: #fff; padding: 6px 10px; font-size: 15px; width: 90px;
      text-align: right; font-variant-numeric: tabular-nums;
    }
    .blinds-tbl input:focus { outline: none; border-color: #7c3aed; background: #2a2a2a; }
    .blinds-tbl input.error { border-color: #ef4444; }
    .blinds-tbl .del-btn {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 16px; padding: 4px 8px; border-radius: 4px;
    }
    .blinds-tbl .del-btn:hover { color: #ef4444; background: #2a1a1a; }
    .break-divider td {
      padding: 6px 8px; color: #4a4a7a; font-size: 11px; letter-spacing: 1px;
      border-top: 1px solid #2a2a3a; border-bottom: 1px solid #2a2a3a;
    }
    .add-row-btn {
      background: none; border: 1px dashed #2a2a2a; color: #555;
      width: 100%; padding: 8px; border-radius: 6px; margin-top: 6px;
      cursor: pointer; font-size: 13px;
    }
    .add-row-btn:hover { border-color: #7c3aed; color: #7c3aed; }
    .reset-link {
      background: none; border: none; color: #444; font-size: 12px;
      cursor: pointer; text-decoration: underline; padding: 0;
    }
    .reset-link:hover { color: #ef4444; }
    .settings-error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <div class="top">
    <button class="corner-btn" title="Restart" onclick="restartTournament()">↺</button>
    <div class="level-info">
      <div class="level-label" id="levelLabel">Round 1</div>
      <div class="blinds-current" id="blindsCurrent">10 / 20</div>
    </div>
    <button class="corner-btn" title="Настройки" onclick="openSettings()">⚙</button>
  </div>

  <div class="timer-wrap">
    <div class="timer" id="timer">20:00</div>
  </div>

  <div class="end-screen">
    <h1>Tournament Over</h1>
    <p>Хорошая игра!</p>
    <button class="btn" style="width:auto;padding:0 24px;height:44px;font-size:15px;" onclick="restartTournament()">↺ Начать заново</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="next-info" id="nextInfo">Next: 20 / 40</div>
    <div class="controls">
      <button class="btn btn-ghost" title="В начало уровня" onclick="resetStage()">⏮</button>
      <button class="btn" title="Предыдущий уровень" onclick="prevStage()">⏪</button>
      <button class="btn btn-lg" id="pauseBtn" onclick="togglePause()">▶</button>
      <button class="btn" title="Следующий уровень" onclick="nextStage()">⏩</button>
      <button class="btn btn-ghost" title="Последний уровень" onclick="goToLast()">⏭</button>
    </div>
  </div>

  <div id="settings-screen">
    <div class="settings-top">
      <button class="back-btn" onclick="closeSettings()">← Назад</button>
      <h1>НАСТРОЙКИ</h1>
      <button class="settings-save-btn" onclick="saveSettings()">Сохранить</button>
    </div>
    <div class="settings-content">

      <div>
        <div class="settings-section-title">Время</div>
        <div class="settings-fields-row">
          <div class="settings-field">
            <label>Длительность уровня</label>
            <div class="settings-field-row">
              <input id="cfg-level-duration" type="number" min="1" max="999">
              <span class="settings-field-unit">мин</span>
            </div>
            <div class="settings-field-error" id="err-level-duration">Введите целое число от 1 до 999</div>
          </div>
          <div class="settings-field">
            <label>Перерыв</label>
            <div class="settings-field-row">
              <input id="cfg-break-duration" type="number" min="1" max="999">
              <span class="settings-field-unit">мин</span>
            </div>
            <div class="settings-field-error" id="err-break-duration">Введите целое число от 1 до 999</div>
          </div>
          <div class="settings-field">
            <label>Перерыв каждые</label>
            <div class="settings-field-row">
              <input id="cfg-break-every" type="number" min="1" max="99">
              <span class="settings-field-unit">уровня</span>
            </div>
            <div class="settings-field-error" id="err-break-every">Введите целое число ≥ 1</div>
          </div>
        </div>
      </div>

      <div>
        <div class="settings-section-title">
          <span>Блайнды</span>
          <button class="reset-link" onclick="resetToDefaults()">сбросить к умолчаниям</button>
        </div>
        <table class="blinds-tbl">
          <thead><tr><th>#</th><th>SB</th><th>BB</th><th></th></tr></thead>
          <tbody id="blinds-tbody"></tbody>
        </table>
        <button class="add-row-btn" onclick="addBlindRow()">+ добавить уровень</button>
        <div class="settings-error-msg" id="err-blinds">Добавьте хотя бы один уровень</div>
      </div>

    </div>
  </div>

  <script>
    // ─── CONFIG ─────────────────────────────────────────────────────────────────

    const DEFAULT_CONFIG = {
      levelDuration: 20,
      breakDuration: 10,
      breakEvery: 2,
      blindLevels: [
        { sb: 10,  bb: 20   },
        { sb: 20,  bb: 40   },
        { sb: 30,  bb: 60   },
        { sb: 40,  bb: 80   },
        { sb: 60,  bb: 120  },
        { sb: 80,  bb: 160  },
        { sb: 100, bb: 200  },
        { sb: 150, bb: 300  },
        { sb: 200, bb: 400  },
        { sb: 300, bb: 600  },
        { sb: 400, bb: 800  },
        { sb: 600, bb: 1200 },
        { sb: 800, bb: 1600 },
        { sb: 1000,bb: 2000 },
      ],
    };

    function loadConfig() {
      try {
        const saved = localStorage.getItem('pokerTimerConfig');
        return saved ? JSON.parse(saved) : structuredClone(DEFAULT_CONFIG);
      } catch {
        return structuredClone(DEFAULT_CONFIG);
      }
    }

    function saveConfig(cfg) {
      localStorage.setItem('pokerTimerConfig', JSON.stringify(cfg));
    }

    let config = loadConfig();

    // ─── DATA ────────────────────────────────────────────────────────────────────

    function buildStages() {
      const levelDuration = config.levelDuration * 60;
      const breakDuration = config.breakDuration * 60;
      const result = [];
      for (let i = 0; i < config.blindLevels.length; i++) {
        const levelNum = i + 1;
        result.push({
          type: 'level',
          levelNum,
          sb: config.blindLevels[i].sb,
          bb: config.blindLevels[i].bb,
          duration: levelDuration,
        });
        const isLast = levelNum === config.blindLevels.length;
        if (levelNum % config.breakEvery === 0 && !isLast) {
          result.push({ type: 'break', duration: breakDuration });
        }
      }
      return result;
    }

    let stages = buildStages();

    // ─── STATE ──────────────────────────────────────────────────────────────────

    let currentStage = 0;
    let timeLeft     = stages[0].duration;
    let isPaused     = true;
    let timerId      = null;
    let warnedOneMin = false; // флаг: предупреждение за 1 мин уже сыграно

    // ─── TIMER ENGINE ───────────────────────────────────────────────────────────

    function tick() {
      if (isPaused) return;

      // Предупреждение за 60 секунд (только для уровней, не для перерывов)
      if (timeLeft === 61 && stages[currentStage].type === 'level' && !warnedOneMin) {
        warnedOneMin = true;
        playBeep(1);
      }

      timeLeft--;

      if (timeLeft <= 0) {
        advanceStage();
        return;
      }

      render();
    }

    function advanceStage() {
      const nextIdx = currentStage + 1;
      if (nextIdx >= stages.length) {
        // Турнир окончен
        clearInterval(timerId);
        timerId  = null;
        isPaused = true;
        document.body.classList.add('is-over');
        render();
        return;
      }

      const wasBreak = stages[currentStage].type === 'break';
      currentStage  = nextIdx;
      timeLeft      = stages[currentStage].duration;
      warnedOneMin  = false;

      // Звук при переходе
      if (stages[currentStage].type === 'break') {
        playBeep(2); // двойной beep → перерыв
      } else if (wasBreak) {
        playBeep(3); // тройной beep → конец перерыва
      } else {
        playBeep(2); // двойной beep → новый уровень
      }

      render();
    }

    function togglePause() {
      if (document.body.classList.contains('is-over')) return;
      isPaused = !isPaused;
      render();
    }

    function resetStage() {
      timeLeft     = stages[currentStage].duration;
      warnedOneMin = false;
      render();
    }

    function prevStage() {
      if (currentStage > 0) {
        currentStage--;
        timeLeft     = stages[currentStage].duration;
        warnedOneMin = false;
        render();
      }
    }

    function nextStage() {
      if (currentStage < stages.length - 1) {
        currentStage++;
        timeLeft     = stages[currentStage].duration;
        warnedOneMin = false;
        render();
      }
    }

    function goToLast() {
      currentStage = stages.length - 1;
      timeLeft     = stages[currentStage].duration;
      warnedOneMin = false;
      render();
    }

    function restartTournament() {
      clearInterval(timerId);
      currentStage = 0;
      timeLeft     = stages[0].duration;
      isPaused     = true;
      warnedOneMin = false;
      document.body.classList.remove('is-over', 'is-break', 'is-paused');
      render();
      timerId      = setInterval(tick, 1000);
    }

    function rebuildStages() {
      stages = buildStages();
      currentStage = 0;
      timeLeft     = stages[0].duration;
      warnedOneMin = false;
    }

    // ─── AUDIO ──────────────────────────────────────────────────────────────────

    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playBeep(count = 1, freq = 880, duration = 0.15) {
      const ctx = getAudioCtx();
      const gap = 0.1; // пауза между beep-ами

      for (let i = 0; i < count; i++) {
        const osc   = ctx.createOscillator();
        const gain  = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.type      = 'sine';
        osc.frequency.value = freq;

        const start = ctx.currentTime + i * (duration + gap);
        const end   = start + duration;

        gain.gain.setValueAtTime(0.4, start);
        gain.gain.exponentialRampToValueAtTime(0.001, end);

        osc.start(start);
        osc.stop(end);
      }
    }

    // ─── HELPERS ────────────────────────────────────────────────────────────────

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function getNextInfo() {
      const next = stages[currentStage + 1];
      if (!next) return 'Финал турнира';

      if (next.type === 'break') {
        // После перерыва — следующий уровень
        const afterBreak = stages[currentStage + 2];
        const afterStr = afterBreak ? ` → потом ${afterBreak.sb} / ${afterBreak.bb}` : '';
        return `☕ Перерыв ${config.breakDuration} мин${afterStr}`;
      }

      if (next.type === 'level') {
        if (stages[currentStage].type === 'break') {
          return `Следующий уровень: ${next.sb} / ${next.bb}`;
        }
        return `Далее: ${next.sb} / ${next.bb}`;
      }

      return '';
    }

    // ─── RENDER ─────────────────────────────────────────────────────────────────

    function render() {
      const stage = stages[currentStage];

      // body классы
      document.body.classList.toggle('is-break',  stage.type === 'break');
      document.body.classList.toggle('is-paused', isPaused);

      // Кнопка паузы
      document.getElementById('pauseBtn').textContent = isPaused ? '▶' : '⏸';

      // Таймер
      document.getElementById('timer').textContent = formatTime(timeLeft);

      // Прогресс-бар (доля прошедшего времени)
      const elapsed  = stage.duration - timeLeft;
      const pct      = (elapsed / stage.duration) * 100;
      document.getElementById('progressFill').style.width = pct + '%';

      // Верхняя строка
      if (stage.type === 'level') {
        document.getElementById('levelLabel').textContent    = `Round ${stage.levelNum}`;
        document.getElementById('blindsCurrent').textContent = `${stage.sb} / ${stage.bb}`;
      } else {
        document.getElementById('levelLabel').textContent    = '☕ Break';
        document.getElementById('blindsCurrent').textContent = 'Перерыв';
      }

      // Нижняя строка "Next:"
      document.getElementById('nextInfo').innerHTML =
        `<strong>Next:</strong> ${getNextInfo()}`;
    }

    // Первый рендер при загрузке
    render();

    // Запуск интервала (1 раз при загрузке страницы)
    timerId = setInterval(tick, 1000);

    // ─── SETTINGS ────────────────────────────────────────────────────────────────

    let formBlinds = []; // рабочая копия блайндов для формы

    function openSettings() {
      if (!isPaused) { isPaused = true; render(); }
      document.getElementById('cfg-level-duration').value = config.levelDuration;
      document.getElementById('cfg-break-duration').value = config.breakDuration;
      document.getElementById('cfg-break-every').value    = config.breakEvery;
      formBlinds = config.blindLevels.map(l => ({ sb: l.sb, bb: l.bb }));
      clearSettingsErrors();
      renderBlindsTable();
      document.body.classList.add('is-settings');
    }

    function closeSettings() {
      document.body.classList.remove('is-settings');
    }

    function getFormBreakEvery() {
      return Math.max(1, parseInt(document.getElementById('cfg-break-every').value, 10) || 1);
    }

    function renderBlindsTable() {
      const tbody  = document.getElementById('blinds-tbody');
      const bEvery = getFormBreakEvery();
      tbody.innerHTML = '';
      formBlinds.forEach((level, i) => {
        const levelNum = i + 1;
        const sb = Number(level.sb) || 0;
        const bb = Number(level.bb) || 0;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="row-num">${levelNum}</td>
          <td><input type="number" min="1" value="${sb}"
                     oninput="formBlinds[${i}].sb = +this.value"></td>
          <td><input type="number" min="1" value="${bb}"
                     oninput="formBlinds[${i}].bb = +this.value"></td>
          <td><button class="del-btn" onclick="removeBlindRow(${i})">✕</button></td>
        `;
        tbody.appendChild(tr);
        const isLast = i === formBlinds.length - 1;
        if (levelNum % bEvery === 0 && !isLast) {
          const divider = document.createElement('tr');
          divider.className = 'break-divider';
          divider.innerHTML = '<td colspan="4">── ☕ Перерыв ──</td>';
          tbody.appendChild(divider);
        }
      });
    }

    function addBlindRow() {
      const last = formBlinds[formBlinds.length - 1];
      formBlinds.push({ sb: last ? last.sb * 2 : 10, bb: last ? last.bb * 2 : 20 });
      renderBlindsTable();
    }

    function removeBlindRow(i) {
      formBlinds.splice(i, 1);
      renderBlindsTable();
    }

    function resetToDefaults() {
      document.getElementById('cfg-level-duration').value = DEFAULT_CONFIG.levelDuration;
      document.getElementById('cfg-break-duration').value = DEFAULT_CONFIG.breakDuration;
      document.getElementById('cfg-break-every').value    = DEFAULT_CONFIG.breakEvery;
      formBlinds = DEFAULT_CONFIG.blindLevels.map(l => ({ sb: l.sb, bb: l.bb }));
      clearSettingsErrors();
      renderBlindsTable();
    }

    function clearSettingsErrors() {
      document.getElementById('cfg-level-duration').classList.remove('error');
      document.getElementById('cfg-break-duration').classList.remove('error');
      document.getElementById('cfg-break-every').classList.remove('error');
      document.getElementById('err-level-duration').style.display = 'none';
      document.getElementById('err-break-duration').style.display = 'none';
      document.getElementById('err-break-every').style.display    = 'none';
      document.getElementById('err-blinds').style.display         = 'none';
      document.querySelectorAll('#blinds-tbody input').forEach(inp => inp.classList.remove('error'));
    }

    // Обновлять разделители при изменении поля "каждые N уровней"
    document.getElementById('cfg-break-every').addEventListener('input', renderBlindsTable);
  </script>
</body>
</html>
