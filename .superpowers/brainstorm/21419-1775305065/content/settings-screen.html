<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a2a;
  }
  .top h1 { font-size: 16px; font-weight: 600; color: #ccc; letter-spacing: 1px; }
  .back-btn {
    background: none;
    border: none;
    color: #7c3aed;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .save-btn {
    background: #7c3aed;
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 7px 18px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .save-btn:hover { background: #6d28d9; }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* SECTION */
  .section-title {
    font-size: 11px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .fields-row {
    display: flex;
    gap: 12px;
  }
  .field {
    flex: 1;
    background: #242424;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field input {
    background: #333;
    border: 1px solid #444;
    border-radius: 6px;
    color: #fff;
    padding: 6px 10px;
    font-size: 18px;
    font-weight: 700;
    width: 72px;
    text-align: center;
  }
  .field input:focus { outline: none; border-color: #7c3aed; }
  .field-unit { color: #555; font-size: 13px; }

  /* BLINDS TABLE */
  .blinds-table { width: 100%; border-collapse: collapse; }
  .blinds-table th {
    color: #555;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: left;
    padding: 0 8px 8px;
    font-weight: normal;
  }
  .blinds-table th:first-child { width: 32px; }
  .blinds-table th:last-child { width: 40px; }
  .blinds-table td { padding: 3px 8px; }
  .row-num { color: #444; font-size: 12px; text-align: center; }
  .blinds-table input {
    background: #242424;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    padding: 6px 10px;
    font-size: 15px;
    width: 90px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .blinds-table input:focus { outline: none; border-color: #7c3aed; background: #2a2a2a; }
  .blinds-table tr:hover input { border-color: #3a3a3a; }
  .del-btn {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .del-btn:hover { color: #ef4444; background: #2a1a1a; }
  .add-row-btn {
    background: none;
    border: 1px dashed #2a2a2a;
    color: #555;
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    margin-top: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .add-row-btn:hover { border-color: #7c3aed; color: #7c3aed; }

  /* RESET */
  .reset-link {
    background: none;
    border: none;
    color: #444;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .reset-link:hover { color: #ef4444; }
</style>
</head>
<body>

  <div class="top">
    <button class="back-btn">← Назад</button>
    <h1>НАСТРОЙКИ</h1>
    <button class="save-btn">Сохранить</button>
  </div>

  <div class="content">

    <!-- Timing -->
    <div>
      <div class="section-title">Время</div>
      <div class="fields-row">
        <div class="field">
          <label>Длительность уровня</label>
          <div class="field-row">
            <input value="20">
            <span class="field-unit">мин</span>
          </div>
        </div>
        <div class="field">
          <label>Перерыв</label>
          <div class="field-row">
            <input value="10">
            <span class="field-unit">мин</span>
          </div>
        </div>
        <div class="field">
          <label>Перерыв каждые</label>
          <div class="field-row">
            <input value="2">
            <span class="field-unit">уровня</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Blinds -->
    <div>
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Блайнды</span>
        <button class="reset-link">сбросить к умолчаниям</button>
      </div>
      <table class="blinds-table">
        <tr><th>#</th><th>SB</th><th>BB</th><th></th></tr>
        <tr><td class="row-num">1</td><td><input value="10"></td><td><input value="20"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">2</td><td><input value="20"></td><td><input value="40"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">3</td><td><input value="30"></td><td><input value="60"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">4</td><td><input value="40"></td><td><input value="80"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">5</td><td><input value="60"></td><td><input value="120"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">6</td><td><input value="80"></td><td><input value="160"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">7</td><td><input value="100"></td><td><input value="200"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">8</td><td><input value="150"></td><td><input value="300"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">9</td><td><input value="200"></td><td><input value="400"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">10</td><td><input value="300"></td><td><input value="600"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">11</td><td><input value="400"></td><td><input value="800"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">12</td><td><input value="600"></td><td><input value="1200"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">13</td><td><input value="800"></td><td><input value="1600"></td><td><button class="del-btn">✕</button></td></tr>
        <tr><td class="row-num">14</td><td><input value="1000"></td><td><input value="2000"></td><td><button class="del-btn">✕</button></td></tr>
      </table>
      <button class="add-row-btn">+ добавить уровень</button>
    </div>

  </div>

</body>
</html>
