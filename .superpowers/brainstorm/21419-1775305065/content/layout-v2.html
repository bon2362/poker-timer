<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #fff;
    font-family: 'Arial', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* TOP BAR */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 28px 0;
  }
  .level-info {
    text-align: center;
    flex: 1;
  }
  .level-label {
    font-size: 13px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .blinds-current {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .corner-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    width: 32px;
  }

  /* TIMER */
  .timer-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .timer {
    font-size: clamp(140px, 22vw, 240px);
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 0 0 6px;
  }
  .progress-bar {
    height: 3px;
    background: #333;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 53%;
    background: #7c3aed;
    transition: width 1s linear;
  }

  /* BOTTOM */
  .bottom {
    padding: 8px 28px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .next-info {
    font-size: 13px;
    color: #888;
    letter-spacing: 1px;
  }
  .next-info span {
    color: #aaa;
    font-weight: 600;
  }
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    background: #7c3aed;
    border: none;
    color: #fff;
    border-radius: 8px;
    width: 44px;
    height: 38px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-ghost {
    background: #2a2a2a;
  }
  .btn-lg {
    width: 52px;
    height: 42px;
    font-size: 18px;
  }
</style>
</head>
<body>

  <div class="top">
    <button class="corner-btn">⏱</button>
    <div class="level-info">
      <div class="level-label">Round 3</div>
      <div class="blinds-current">30 / 60</div>
    </div>
    <button class="corner-btn">⚙</button>
  </div>

  <div class="timer-wrap">
    <div class="timer">18:42</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <div class="bottom">
    <div class="next-info">Next: <span>☕ Break 10 min</span> → then 40 / 80</div>
    <div class="controls">
      <button class="btn btn-ghost">⏮</button>
      <button class="btn">⏪</button>
      <button class="btn btn-lg">⏸</button>
      <button class="btn">⏩</button>
      <button class="btn btn-ghost">⏭</button>
    </div>
  </div>

</body>
</html>
